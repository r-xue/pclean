name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.62.2
          environments: test
          cache: false

      # ---- CASA runtime data -------------------------------------------
      - name: Configure CASA
        shell: bash
        run: |
          mkdir -p ~/.casa
          mkdir -p casarundata
          cat > ~/.casa/config.py << PYEOF
          measurespath = "$GITHUB_WORKSPACE/casarundata"
          datapath = [ "$GITHUB_WORKSPACE/casarundata", "$GITHUB_WORKSPACE/pipeline-testdata" ]
          measures_auto_update = True
          data_auto_update = True
          PYEOF

      - name: Cache casarundata
        uses: actions/cache@v4
        with:
          path: casarundata
          key: casarundata

      - name: Fetch casarundata
        shell: bash
        run: |
          pixi run -e test python -c "import casatools" || {
            echo 'casatools import failed; casarundata may be incomplete.' >&2
            exit 1
          }

      # ---- Pipeline unit-test data -------------------------------------
      - name: Get latest testdata commit hash
        id: testdata-commit
        shell: bash
        run: |
          echo "sha=$(git ls-remote https://open-bitbucket.nrao.edu/scm/pipe/pipeline-testdata.git HEAD | awk '{ print $1 }')" >> "$GITHUB_OUTPUT"

      - name: Cache pipeline-testdata
        uses: actions/cache@v4
        id: cache-testdata
        with:
          path: pipeline-testdata
          key: pipeline-testdata-unit-vlassql-${{ steps.testdata-commit.outputs.sha }}

      - name: Checkout and LFS pull test data
        if: steps.cache-testdata.outputs.cache-hit != 'true'
        run: |
          if [ ! -d "pipeline-testdata/.git" ]; then
            git clone --filter=blob:none --sparse \
              https://open-bitbucket.nrao.edu/scm/pipe/pipeline-testdata.git pipeline-testdata
          fi
          cd pipeline-testdata
          git sparse-checkout set \
            pl-unittest \
            pl-regressiontest/vlass_quicklook/TSKY0001.sb32295801.eb32296475.57549.31722762731_split_withcorrectdata.ms
          git lfs pull

      # ---- Tests -------------------------------------------------------
      - name: Run tests
        run: pixi run -e test pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: pixi run -e test pytest tests/ -v --cov=pclean --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
