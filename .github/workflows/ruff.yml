name: Ruff
on: [push, pull_request]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Lint — detect violations; don't --fix (fixes aren't committed back)
      - uses: astral-sh/ruff-action@v3
        with:
          version: '0.11.6'
          args: check src tests

      # Format — verify code matches `ruff format` output
      - uses: astral-sh/ruff-action@v3
        with:
          version: '0.11.6'
          args: format src tests --check